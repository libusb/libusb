name: Windows build and Package

on:
  push:
    branches:
      - master
    tags:
      - '**'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    strategy:
      matrix:
        os:
          - 'windows-2022'
          - 'windows-2025'
        configuration:
          - 'Debug'
          - 'Release'
          - 'Debug-MT'
          - 'Release-MT'
          - 'Debug-Hotplug'
          - 'Release-Hotplug'
          - 'Debug-Hotplug-MT'
          - 'Release-Hotplug-MT'
        architecture:
          - 'Win32'
          - 'x64'
          - 'ARM64'

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Full history + tags so the MSVC PreBuildEvent's call to
          # build-aux/gen-describe.ps1 can produce a tag-prefixed
          # `git describe` string.
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: Build solution
        run: |
          msbuild msvc/libusb.sln /m -property:Configuration=${{ matrix.configuration }} -property:Platform=${{ matrix.architecture }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.os }}-${{ matrix.configuration }}-${{ matrix.architecture }}
          path: |
            build/**/*.exe
            build/**/dll/libusb-1.0.dll
            build/**/dll/libusb-1.0.lib
            build/**/dll/libusb-1.0.exp
            build/**/dll/libusb-1.0.pdb
            build/**/lib/libusb-1.0.lib

  # Compile the MSVC solution with /TP (treat all sources as C++) — configure +
  # build only, no tests/runtime. Verifies the code stays valid C++ under MSVC.
  build-cxx:
    runs-on: windows-2025
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v3

      - name: build as C++ (MSVC)
        run: |
          # Force the library sources to compile as C++. A Directory.Build.props in
          # msvc/ applies to the projects there, which don't set CompileAs themselves.
          '<Project><ItemDefinitionGroup><ClCompile><CompileAs>CompileAsCpp</CompileAs></ClCompile></ItemDefinitionGroup></Project>' | Set-Content msvc/Directory.Build.props
          msbuild msvc/libusb_dll.vcxproj /m -property:Configuration=Release -property:Platform=x64
