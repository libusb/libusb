name: MSYS2 clang64 build
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history + tags for build-aux/gen-describe.sh.
          fetch-depth: 0
      - uses: msys2/setup-msys2@v2
        with:
          msystem: clang64
          update: true
          install: git mingw-w64-clang-x86_64-cc mingw-w64-clang-x86_64-autotools
      - name: CI-Build
        run: |
          echo 'Running in MSYS2!'
          ./bootstrap.sh
          ./.private/ci-build.sh --build-dir build-msys2-clang64
      # The autotools test driver buffers each test's output into its own
      # tests/<test>.log; keep them (and config.log) when something goes wrong.
      - name: Upload test logs
        uses: actions/upload-artifact@v7
        if: failure() || cancelled()
        with:
          name: test-logs-msys2-clang64
          path: |
            build*/config.log
            build*/tests/*.log
          if-no-files-found: ignore
