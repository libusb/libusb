name: macOS

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on: [push, pull_request]

# A workflow run is made up of one or more jobs that can run
# sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    runs-on: macos-latest
    # Fail fast instead of burning the default 6-hour limit when a test
    # hangs (see the stress_mt hang, issue #1869).
    timeout-minutes: 60

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job
      # can access it. Full history + tags are needed by
      # build-aux/gen-describe.sh.
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: setup prerequisites
        shell: bash
        run: |
          brew update
          brew install autoconf automake libtool m4

      - name: bootstrap
        shell: bash
        run: ./bootstrap.sh

      - name: compile
        shell: bash
        # stress_mt sometimes hangs forever on the macOS runners (issue
        # #1869). Without a watchdog the job dies at the GitHub timeout
        # and every trace of the hang is lost with it (automake buffers
        # the test output). A normal run of this step takes well under
        # 15 minutes, so after 40 minutes assume a hang: capture stack
        # samples of the hung test, then kill it so the job fails
        # quickly with the evidence attached (ci-build.sh already dumps
        # test-suite.log when make check fails).
        run: |
          (
            sleep 2400
            pid=$(pgrep -nx stress_mt || true)
            if [ -n "${pid}" ]; then
              sample "${pid}" 5 -file stress_mt_sample.txt || true
              kill -ABRT "${pid}" || true
            fi
          ) >/dev/null 2>&1 &
          watchdog_pid=$!
          status=0
          .private/ci-build.sh --build-dir build || status=$?
          kill "${watchdog_pid}" 2>/dev/null || true
          if [ -f stress_mt_sample.txt ]; then
            echo '::group::stress_mt watchdog: hung process stack samples'
            cat stress_mt_sample.txt
            echo '::endgroup::'
          fi
          # automake's parallel-tests driver only prints PASS/FAIL to this
          # log; the test's own stdout/stderr goes to its .log file, which
          # otherwise only surfaces via ci-build.sh's test-suite.log dump on
          # overall failure. Show it unconditionally so a pass doesn't hide
          # non-fatal warnings (e.g. transient device-access skips) that are
          # still worth auditing.
          if [ -f build/tests/stress_mt.log ]; then
            echo '::group::stress_mt.log (full test output, pass or fail)'
            cat build/tests/stress_mt.log
            echo '::endgroup::'
          fi
          exit "${status}"

      - name: Xcode
        shell: bash
        run: cd Xcode && xcodebuild -project libusb.xcodeproj
