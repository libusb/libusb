name: MSYS2 build
on:
  push:
    branches:
      - master
    tags:
      - '**'
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v6
        with:
          # Full history + tags for build-aux/gen-describe.sh.
          fetch-depth: 0
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: git mingw-w64-x86_64-cc mingw-w64-x86_64-autotools
      - name: bootstrap
        run: ./bootstrap.sh
      - name: Build
        # GCC on MSYS2 doesn't have ASAN support (but Clang does).
        run: ./.private/ci-build.sh --build-dir build-msys2 --no-asan
      - name: Build with logging disabled
        run: ./.private/ci-build.sh --build-dir build-msys2-nolog --no-asan -- --disable-log
      # The autotools test driver buffers each test's output into its own
      # tests/<test>.log; keep them (and config.log) when something goes wrong.
      - name: Upload test logs
        uses: actions/upload-artifact@v7
        if: failure() || cancelled()
        with:
          name: test-logs-msys2
          path: |
            build*/config.log
            build*/tests/*.log
          if-no-files-found: ignore
